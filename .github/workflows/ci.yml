name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall -q .

      - name: Import smoke test
        run: |
          python -c "import antievasion, capture, command_history, database, diff_tool, forensics, fp_filter, live_analysis, pe_analysis, peripherals, persistence, redaction, report, report_md, report_signing, scanners, telador; print('Smoke imports OK')"
