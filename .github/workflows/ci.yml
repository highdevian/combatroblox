name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    name: ruff (lint de bug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint (config em ruff.toml)
        run: ruff check .

  lint-and-smoke:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        # Cobre a versão de build (3.11) e versões mais novas, pra pegar
        # cedo problemas de compatibilidade futura (ex: APIs deprecadas).
        python-version: ["3.11", "3.12", "3.13"]

    name: tests (py${{ matrix.python-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: |
          python -m compileall -q .

      - name: Import smoke test
        run: |
          python -c "import antievasion, capture, command_history, database, diff_tool, discord_cache, evidence, extra_forensics, forensics, fp_filter, fresh_install, live_analysis, matching, network_scanners, pe_analysis, peripherals, persistence, redaction, report, report_md, report_signing, scanners, sigupdate, telador, watch_server; print('Smoke imports OK')"

      - name: Validate signature files
        run: |
          python -c "import json; json.load(open('signatures.example.json', encoding='utf-8')); print('signatures.example.json valido')"
          python -c "import json, sigupdate; d = json.load(open('signatures.dist.json', encoding='utf-8')); assert sigupdate._looks_like_valid_signatures(d), 'estrutura invalida'; assert isinstance(d.get('version'), str), 'sem version'; print('signatures.dist.json valido (versao', d['version'], ')')"

      - name: Unit tests (detection + anti-false-positive + engine + watch + sigupdate)
        run: |
          python -m pytest tests/ -q
