name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ruff:
    name: ruff (lint de bug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint (config em ruff.toml)
        run: ruff check .

  lint-and-smoke:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        # Cobre a versão de build (3.11) e versões mais novas, pra pegar
        # cedo problemas de compatibilidade futura (ex: APIs deprecadas).
        python-version: ["3.11", "3.12", "3.13"]

    name: tests (py${{ matrix.python-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: |
          python -m compileall -q .

      - name: Import smoke test
        run: |
          python -c "from telador import cli, gui, database, evidence, fp_filter, forensics, matching, report, sigupdate, watch_server; print('Smoke imports OK', cli.__name__, gui.HAS_CTK)"

      - name: Validate signature files
        run: |
          python -c "import json; json.load(open('config/signatures.example.json', encoding='utf-8')); print('signatures.example.json valido')"
          python -c "import json; from telador import sigupdate; d = json.load(open('config/signatures.dist.json', encoding='utf-8')); assert sigupdate._looks_like_valid_signatures(d), 'estrutura invalida'; assert isinstance(d.get('version'), str), 'sem version'; print('signatures.dist.json valido (versao', d['version'], ')')"

      - name: Unit tests (detection + anti-false-positive + engine + watch + sigupdate)
        run: |
          python -m pytest tests/ -q
