name: Release

# Builda o telador.exe e publica a release automaticamente no push de uma tag
# vX.Y.Z. Reprodutível: o binário sai do CI (windows-latest, py3.11), não da
# máquina de ninguém. Espelha o build.bat.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install psutil pyinstaller customtkinter

      - name: Verify modules load locally (pre-build sanity)
        run: python -c "import telador; print('all imports OK')"

      - name: Build telador.exe + telador-gui.exe (via spec)
        # Spec agora define 2 EXE(): CLI (console=True) + GUI (console=False).
        run: python -m PyInstaller telador.spec

      - name: Smoke test CLI (--help)
        run: ./dist/telador.exe --help

      - name: Smoke test GUI exe existe
        shell: pwsh
        run: |
          if (-not (Test-Path dist/telador-gui.exe)) {
            Write-Error "telador-gui.exe nao foi buildado pela spec"
            exit 1
          }
          $sz = (Get-Item dist/telador-gui.exe).Length
          Write-Host "telador-gui.exe: $([math]::Round($sz/1MB, 2)) MB"

      - name: SHA256
        id: sha
        shell: pwsh
        run: |
          $h = (Get-FileHash dist/telador.exe -Algorithm SHA256).Hash.ToLower()
          $gh = (Get-FileHash dist/telador-gui.exe -Algorithm SHA256).Hash.ToLower()
          "sha=$h" >> $env:GITHUB_OUTPUT
          "gui_sha=$gh" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256(cli): $h"
          Write-Host "SHA256(gui): $gh"

      - name: Build zip de distribuição (Telador-vX.X.X.zip)
        id: zip
        shell: pwsh
        run: |
          python pack.py --exe dist/telador.exe --gui-exe dist/telador-gui.exe --output dist
          $zipPath = Get-ChildItem dist/Telador-v*.zip | Select-Object -First 1
          if (-not $zipPath) { Write-Error "zip nao foi criado"; exit 1 }
          $zh = (Get-FileHash $zipPath.FullName -Algorithm SHA256).Hash.ToLower()
          "path=$($zipPath.FullName)" >> $env:GITHUB_OUTPUT
          "sha=$zh" >> $env:GITHUB_OUTPUT
          Write-Host "ZIP: $($zipPath.Name) ($([math]::Round($zipPath.Length/1MB, 2)) MB)"
          Write-Host "SHA256(zip): $zh"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $notes = "Build automatico (CI).`n`nVeja o CHANGELOG.md para as mudancas.`n`n**Downloads (recomendado: telador-gui.exe):**`n- ``telador-gui.exe`` (janela sem terminal, duplo-clique -> UAC -> GUI) - SHA256: ``${{ steps.sha.outputs.gui_sha }}```n- ``Telador-${{ github.ref_name }}.zip`` (kit completo: 2 exes + bats + PLAYBOOK.md) - SHA256: ``${{ steps.zip.outputs.sha }}```n- ``telador.exe`` (CLI classico, terminal) - SHA256: ``${{ steps.sha.outputs.sha }}``"
          gh release view ${{ github.ref_name }} --json tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release already exists. Updating assets and metadata..."
            gh release upload ${{ github.ref_name }} dist/telador.exe --clobber
            gh release upload ${{ github.ref_name }} dist/telador-gui.exe --clobber
            gh release upload ${{ github.ref_name }} "${{ steps.zip.outputs.path }}" --clobber
            gh release edit ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes $notes
          } else {
            Write-Host "Creating new release..."
            gh release create ${{ github.ref_name }} dist/telador.exe dist/telador-gui.exe "${{ steps.zip.outputs.path }}" --title "${{ github.ref_name }}" --notes $notes
          }
